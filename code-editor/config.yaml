---
name: Code Editor
version: 1.118.0.1
slug: code_editor
description: Browser-based code editor for Home Assistant, powered by code-server.
url: https://github.com/gollyjer/home-assistant-code-editor
ingress: true
ingress_port: 1337
ingress_stream: true
panel_icon: mdi:file-code-outline
startup: application
init: false
arch:
  - aarch64
  - amd64
hassio_api: true
hassio_role: manager
homeassistant_api: true
map:
  - type: homeassistant_config
    read_only: false
    path: /config
options:
  log_level: info
  config_path: /config
  packages: []
  init_commands: []
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  config_path: str
  packages:
    - str
  init_commands:
    - str
